<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobilix Admin</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:#f4f7fb;
    color:#111827;
    padding:24px;
}

.admin-container{
    max-width:1250px;
    margin:0 auto;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    margin-bottom:28px;
    background:white;
    padding:18px 22px;
    border-radius:22px;
    box-shadow:0 12px 35px rgba(15,23,42,.06);
}

.topbar h1{
    font-size:28px;
    font-weight:800;
}

.logout-btn{
    height:44px;
    padding:0 18px;
    border:none;
    border-radius:12px;
    background:#ef4444;
    color:white;
    cursor:pointer;
    font-weight:700;
}

.grid{
    display:grid;
    grid-template-columns:380px 1fr;
    gap:24px;
    align-items:start;
}

.card{
    background:white;
    border-radius:24px;
    padding:24px;
    box-shadow:0 12px 35px rgba(15,23,42,.06);
}

.card h2{
    font-size:22px;
    margin-bottom:20px;
}

input,
textarea,
select{
    width:100%;
    margin-bottom:14px;
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:14px 15px;
    font-size:15px;
    outline:none;
    background:white;
}

input:focus,
textarea:focus,
select:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.08);
}

select{
    height:52px;
}

textarea{
    resize:none;
    height:120px;
}

input[type="file"]{
    background:#f9fafb;
    border-style:dashed;
    cursor:pointer;
}

button{
    border:none;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-1px);
}

.add-btn{
    width:100%;
    height:52px;
    background:#2563eb;
    color:white;
    border-radius:14px;
    font-size:16px;
    font-weight:800;
}

.cancel-btn{
    width:100%;
    height:50px;
    background:#6b7280;
    color:white;
    border-radius:14px;
    font-size:15px;
    font-weight:700;
    margin-top:10px;
}

.variants-admin-box{
    margin-bottom:15px;
    padding:15px;
    background:#f9fafb;
    border:1px solid #e5e7eb;
    border-radius:16px;
}

.variants-admin-box h3{
    font-size:16px;
    margin-bottom:12px;
}

.variant-row{
    padding:12px;
    background:white;
    border:1px solid #e5e7eb;
    border-radius:14px;
    margin-bottom:12px;
}

.variant-row-top{
    display:flex;
    gap:10px;
    align-items:center;
}

.variant-row-top input{
    margin-bottom:10px;
}

.variant-remove-btn{
    width:42px;
    height:42px;
    border-radius:12px;
    background:#ef4444;
    color:white;
    font-weight:800;
    margin-bottom:10px;
}

.variant-preview{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:10px;
    background:#e5e7eb;
}

.variant-add-btn{
    width:100%;
    height:44px;
    border-radius:12px;
    background:#111827;
    color:white;
    font-weight:700;
}

.products-list{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:16px;
}

.product-item{
    background:#f9fafb;
    border:1px solid #eef2f7;
    padding:14px;
    border-radius:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.product-item img{
    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:14px;
    background:#e5e7eb;
}

.product-info h3{
    font-size:17px;
    margin-bottom:8px;
}

.product-info p{
    color:#6b7280;
    margin-bottom:5px;
    font-size:14px;
}

.product-actions{
    display:flex;
    gap:10px;
    margin-top:auto;
}

.edit-btn,
.delete-btn{
    flex:1;
    height:42px;
    border-radius:12px;
    color:white;
    font-size:15px;
    font-weight:700;
}

.edit-btn{
    background:#2563eb;
}

.delete-btn{
    background:#ef4444;
}

.stock-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:6px 10px;
    border-radius:999px;
    background:#dcfce7;
    color:#166534;
    font-weight:800;
    font-size:13px;
    margin-top:5px;
}

.price-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:6px 10px;
    border-radius:999px;
    background:#dbeafe;
    color:#1d4ed8;
    font-weight:800;
    font-size:13px;
}

.variant-tags{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:8px;
}

.variant-tags span{
    font-size:12px;
    font-weight:700;
    padding:6px 9px;
    border-radius:999px;
    background:#eef2ff;
    color:#2563eb;
}

@media(max-width:900px){
    body{
        padding:14px;
    }

    .topbar{
        border-radius:18px;
        padding:16px;
    }

    .topbar h1{
        font-size:22px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .card{
        padding:18px;
        border-radius:20px;
    }

    .products-list{
        grid-template-columns:1fr;
    }
}
</style>

</head>
<body>

<div class="admin-container">

    <div class="topbar">
        <h1>Mobilix Admin</h1>

        <button class="logout-btn" onclick="logout()">
            Вийти
        </button>
    </div>

    <div class="grid">

        <div class="card">

            <h2 id="formTitle">Додати товар</h2>

            <input type="text" id="title" placeholder="Назва товару">

            <select id="category">
                <option value="Чохли">Чохли</option>
                <option value="Зарядні пристрої">Зарядні пристрої</option>
                <option value="Кабелі">Кабелі</option>
                <option value="Навушники">Навушники</option>
                <option value="Повербанки">Повербанки</option>
                <option value="Тримачі">Тримачі</option>
                <option value="Захисне скло">Захисне скло</option>
                <option value="Смарт-годинники">Смарт-годинники</option>
                <option value="Портативні колонки">Портативні колонки</option>
                <option value="Аксесуари">Аксесуари</option>
                <option value="Карти пам'яті">Карти пам'яті</option>
            </select>

            <input type="number" id="price" placeholder="Ціна">

            <input type="number" id="stock" placeholder="Загальна кількість товару">

            <input type="file" id="imageFile" accept="image/*">

            <div class="variants-admin-box">
                <h3>Варіанти товару</h3>

                <div id="variantsList"></div>

                <button type="button" class="variant-add-btn" onclick="addVariantField()">
                    + Додати варіант
                </button>
            </div>

            <textarea id="description" placeholder="Опис"></textarea>

            <button class="add-btn" id="saveProductBtn" onclick="saveProduct()">
                Додати товар
            </button>

            <button class="cancel-btn" id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">
                Скасувати редагування
            </button>

        </div>

        <div class="card">
            <h2>Товари</h2>

            <div class="products-list" id="productsList"></div>
        </div>

    </div>

</div>

<script>
const API_URL = "https://site--mobilix-backend--98z6fhqjkxml.code.run";

const token = sessionStorage.getItem("adminToken");

let editingProductId = null;
let editingProductImage = null;

if (!token) {
    window.location.replace("admin-login.html");
}

async function uploadImage(file){
    const formData = new FormData();
    formData.append("image", file);

    const uploadResponse = await fetch(`${API_URL}/api/upload`, {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token
        },
        body: formData
    });

    const uploadData = await uploadResponse.json();

    if(!uploadResponse.ok || !uploadData.success){
        throw new Error("Помилка завантаження фото");
    }

    return uploadData.imageUrl;
}

async function loadProducts(){
    const response = await fetch(`${API_URL}/api/products`);
    const products = await response.json();

    const productsList = document.getElementById("productsList");
    productsList.innerHTML = "";

    products.forEach(product => {
        productsList.innerHTML += `
            <div class="product-item">

                <img src="${product.image}" alt="${product.title}">

                <div class="product-info">
                    <h3>${product.title}</h3>

                    <p>${product.category}</p>

                    <span class="price-badge">
                        ${product.price} ₴
                    </span>

                    <br>

                    <span class="stock-badge">
                        В наявності: ${product.stock || 0} шт.
                    </span>

                    ${
                        product.variants && product.variants.length > 0
                        ? `
                            <div class="variant-tags">
                                ${product.variants.map(variant => `
                                    <span>${variant.name} — ${variant.stock || 0} шт.</span>
                                `).join("")}
                            </div>
                        `
                        : ""
                    }
                </div>

                <div class="product-actions">
                    <button 
                        class="edit-btn"
                        onclick='editProduct(${JSON.stringify(product)})'
                    >
                        ✎ Редагувати
                    </button>

                    <button 
                        class="delete-btn"
                        onclick="deleteProduct('${product._id}')"
                    >
                        ✕ Видалити
                    </button>
                </div>

            </div>
        `;
    });
}

function addVariantField(variant = null){
    const variantsList = document.getElementById("variantsList");

    const variantName = variant ? variant.name || "" : "";
    const variantStock = variant ? variant.stock || "" : "";
    const variantImage = variant ? variant.image || "" : "";

    variantsList.innerHTML += `
        <div class="variant-row" data-existing-image="${variantImage}">
            ${
                variantImage
                ? `<img src="${variantImage}" class="variant-preview" alt="">`
                : ""
            }

            <div class="variant-row-top">
                <input 
                    type="text" 
                    class="variant-name" 
                    placeholder="Назва варіанту: Type-C → Lightning"
                    value="${variantName}"
                >

                <button type="button" class="variant-remove-btn" onclick="removeVariantField(this)">
                    ✕
                </button>
            </div>

            <input 
                type="number" 
                class="variant-stock" 
                placeholder="Кількість цього варіанту"
                value="${variantStock}"
            >

            <input 
                type="file" 
                class="variant-image" 
                accept="image/*"
            >
        </div>
    `;
}

function removeVariantField(button){
    button.closest(".variant-row").remove();
}

async function collectVariants(){
    const rows = document.querySelectorAll(".variant-row");
    const variants = [];

    for(const row of rows){
        const name = row.querySelector(".variant-name").value.trim();
        const stock = Number(row.querySelector(".variant-stock").value);
        const imageFile = row.querySelector(".variant-image").files[0];
        const existingImage = row.dataset.existingImage || "";

        if(!name){
            continue;
        }

        let image = existingImage;

        if(imageFile){
            image = await uploadImage(imageFile);
        }

        variants.push({
            name,
            stock: stock || 0,
            image
        });
    }

    return variants;
}

async function saveProduct(){
    const title = document.getElementById("title").value.trim();
    const category = document.getElementById("category").value;
    const price = Number(document.getElementById("price").value);
    const stock = Number(document.getElementById("stock").value);
    const imageFile = document.getElementById("imageFile").files[0];
    const description = document.getElementById("description").value.trim();

    if(!title){
        alert("Вкажи назву товару");
        return;
    }

    if(!price || price <= 0){
        alert("Вкажи нормальну ціну");
        return;
    }

    if(!stock || stock <= 0){
        alert("Вкажи загальну кількість товару");
        return;
    }

    if(!imageFile && !editingProductId){
        alert("Оберіть основне фото товару");
        return;
    }

    try{
        let imageUrl = editingProductImage;

        if(imageFile){
            imageUrl = await uploadImage(imageFile);
        }

        const variants = await collectVariants();

        const productData = {
            title,
            category,
            price,
            stock,
            image: imageUrl,
            description,
            variants
        };

        const url = editingProductId
            ? `${API_URL}/api/products/${editingProductId}`
            : `${API_URL}/api/products`;

        const method = editingProductId ? "PUT" : "POST";

        const response = await fetch(url, {
            method,
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(productData)
        });

        const data = await response.json();

        if(response.ok && data.success){
            alert(editingProductId ? "Товар оновлено" : "Товар додано");

            cancelEdit();
            loadProducts();
        }else{
            alert("Помилка збереження товару");
        }

    }catch(error){
        alert(error.message);
    }
}

function editProduct(product){
    editingProductId = product._id;
    editingProductImage = product.image || "";

    document.getElementById("formTitle").textContent = "Редагувати товар";

    document.getElementById("title").value = product.title || "";
    document.getElementById("category").value = product.category || "Чохли";
    document.getElementById("price").value = product.price || "";
    document.getElementById("stock").value = product.stock || "";
    document.getElementById("description").value = product.description || "";

    document.getElementById("variantsList").innerHTML = "";

    if(product.variants && product.variants.length > 0){
        product.variants.forEach(variant => {
            addVariantField(variant);
        });
    }

    document.getElementById("saveProductBtn").textContent = "Зберегти зміни";
    document.getElementById("cancelEditBtn").style.display = "block";

    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
}

function cancelEdit(){
    editingProductId = null;
    editingProductImage = null;

    document.getElementById("formTitle").textContent = "Додати товар";

    document.getElementById("title").value = "";
    document.getElementById("category").value = "Чохли";
    document.getElementById("price").value = "";
    document.getElementById("stock").value = "";
    document.getElementById("imageFile").value = "";
    document.getElementById("description").value = "";
    document.getElementById("variantsList").innerHTML = "";

    document.getElementById("saveProductBtn").textContent = "Додати товар";
    document.getElementById("cancelEditBtn").style.display = "none";
}

async function deleteProduct(id){
    const confirmDelete = confirm("Видалити товар?");

    if(!confirmDelete){
        return;
    }

    const response = await fetch(`${API_URL}/api/products/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if(response.ok){
        loadProducts();
    }else{
        alert("Помилка видалення товару");
    }
}

function logout(){
    sessionStorage.removeItem("adminToken");
    window.location.href = "admin-login.html";
}

if (token) {
    loadProducts();
}
</script>

</body>
</html>
