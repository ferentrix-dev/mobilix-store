<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobilix Admin</title>
<link rel="icon" href="Images/favicon.png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Inter, Arial, sans-serif;
    background: #f4f7fb;
    color: #111827;
    padding: 24px;
}

.admin-container {
    max-width: 1250px;
    margin: 0 auto;
}

.topbar,
.card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 12px 35px rgba(15, 23, 42, .06);
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding: 18px 22px;
}

.topbar h1 {
    font-size: 28px;
    font-weight: 900;
}

.topbar-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.topbar-actions a,
.topbar-actions button {
    height: 44px;
    padding: 0 18px;
    border: none;
    border-radius: 12px;
    color: #fff;
    cursor: pointer;
    font-weight: 800;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

.orders-btn {
    background: #2563eb;
}

.logout-btn {
    background: #ef4444;
}

.grid {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 24px;
    align-items: start;
}

.card {
    padding: 24px;
}

.card h2 {
    font-size: 22px;
    margin-bottom: 20px;
}

input,
textarea,
select {
    width: 100%;
    margin-bottom: 14px;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 14px 15px;
    font-size: 15px;
    outline: none;
    background: #fff;
}

input:focus,
textarea:focus,
select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, .08);
}

textarea {
    resize: none;
    height: 120px;
}

input[type="file"] {
    background: #f9fafb;
    border-style: dashed;
    cursor: pointer;
}

button {
    border: none;
    cursor: pointer;
    transition: .2s;
}

button:hover,
.topbar-actions a:hover {
    transform: translateY(-1px);
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.checks {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
}

.check-card {
    padding: 14px;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    background: #f9fafb;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 10px;
}

.check-card input {
    width: auto;
    margin: 0;
}

.small-help {
    display: block;
    margin: -6px 0 14px;
    color: #6b7280;
    font-weight: 700;
    font-size: 13px;
}

.images-preview {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 14px;
}

.images-preview img {
    width: 100%;
    height: 64px;
    object-fit: cover;
    border-radius: 10px;
    background: #e5e7eb;
    border: 1px solid #e5e7eb;
}

.variants-admin-box {
    margin-bottom: 15px;
    padding: 15px;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
}

.variants-admin-box h3 {
    font-size: 16px;
    margin-bottom: 12px;
}

.variant-row {
    padding: 12px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    margin-bottom: 12px;
}

.variant-row-top {
    display: flex;
    gap: 10px;
    align-items: center;
}

.variant-row-top input {
    margin-bottom: 10px;
}

.variant-remove-btn {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: #ef4444;
    color: #fff;
    font-weight: 900;
    margin-bottom: 10px;
    flex-shrink: 0;
}

.variant-preview {
    width: 100%;
    height: 90px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 10px;
    background: #e5e7eb;
}

.variant-add-btn {
    width: 100%;
    height: 44px;
    border-radius: 12px;
    background: #111827;
    color: #fff;
    font-weight: 800;
}

.add-btn,
.cancel-btn {
    width: 100%;
    height: 52px;
    border-radius: 14px;
    color: #fff;
    font-size: 16px;
    font-weight: 900;
}

.add-btn {
    background: #2563eb;
}

.cancel-btn {
    background: #6b7280;
    margin-top: 10px;
}

.admin-search {
    margin-bottom: 18px;
}

.products-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
}

.product-item {
    background: #f9fafb;
    border: 1px solid #eef2f7;
    padding: 14px;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.product-item img {
    width: 100%;
    height: 170px;
    object-fit: contain;
    border-radius: 14px;
    background: #fff;
}

.product-info h3 {
    font-size: 17px;
    margin-bottom: 8px;
}

.product-info p {
    color: #6b7280;
    margin-bottom: 5px;
    font-size: 14px;
}

.product-actions {
    display: flex;
    gap: 10px;
    margin-top: auto;
}

.edit-btn,
.delete-btn {
    flex: 1;
    height: 42px;
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    font-weight: 800;
}

.edit-btn {
    background: #2563eb;
}

.delete-btn {
    background: #ef4444;
}

.badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0;
}

.badges span,
.variant-tags span {
    font-size: 12px;
    font-weight: 900;
    padding: 6px 9px;
    border-radius: 999px;
}

.price-badge {
    background: #dbeafe;
    color: #1d4ed8;
}

.old-price-badge {
    background: #fee2e2;
    color: #991b1b;
    text-decoration: line-through;
}

.stock-badge {
    background: #dcfce7;
    color: #166534;
}

.photo-badge {
    background: #fef3c7;
    color: #92400e;
}

.hit-badge {
    background: #ffedd5;
    color: #c2410c;
}

.new-badge {
    background: #e0e7ff;
    color: #3730a3;
}

.variant-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
}

.variant-tags span {
    background: #eef2ff;
    color: #2563eb;
}

.admin-message {
    grid-column: 1 / -1;
    padding: 18px;
    border-radius: 16px;
    background: #f9fafb;
    color: #6b7280;
    font-weight: 800;
}

.admin-message.error {
    background: #fee2e2;
    color: #991b1b;
}

@media (max-width: 900px) {
    body {
        padding: 14px;
    }

    .topbar {
        flex-direction: column;
        align-items: stretch;
    }

    .topbar h1 {
        text-align: center;
        font-size: 22px;
    }

    .topbar-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
    }

    .grid,
    .form-row,
    .checks {
        grid-template-columns: 1fr;
    }

    .products-list {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>
<div class="admin-container">
    <div class="topbar">
        <h1>Mobilix Admin</h1>

        <div class="topbar-actions">
            <a href="admin-orders.html" class="orders-btn">Замовлення</a>
            <button class="logout-btn" onclick="logout()">Вийти</button>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h2 id="formTitle">Додати товар</h2>

            <input type="text" id="title" placeholder="Назва товару">

            <select id="category">
                <option value="Чохли">Чохли</option>
                <option value="Зарядні пристрої">Зарядні пристрої</option>
                <option value="Кабелі">Кабелі</option>
                <option value="Навушники">Навушники</option>
                <option value="Повербанки">Повербанки</option>
                <option value="Тримачі">Тримачі</option>
                <option value="Захисне скло">Захисне скло</option>
                <option value="Смарт-годинники">Смарт-годинники</option>
                <option value="Портативні колонки">Портативні колонки</option>
                <option value="Аксесуари">Аксесуари</option>
                <option value="Карти пам'яті">Карти пам'яті</option>
            </select>

            <div class="form-row">
                <input type="text" inputmode="numeric" id="price" placeholder="Актуальна ціна">
                <input type="text" inputmode="numeric" id="oldPrice" placeholder="Стара ціна">
            </div>

            <input type="text" inputmode="numeric" id="stock" placeholder="Загальна кількість товару">

            <div class="checks">
                <label class="check-card">
                    <input type="checkbox" id="isHit">
                    Хіт продажу
                </label>

                <label class="check-card">
                    <input type="checkbox" id="isNew">
                    Новинка
                </label>
            </div>

            <input type="file" id="imageFile" multiple>
            <small class="small-help">Можна додати до 5 фото товару. Перше фото буде головним.</small>

            <div class="images-preview" id="imagesPreview"></div>

            <div class="variants-admin-box">
                <h3>Варіанти товару</h3>
                <div id="variantsList"></div>
                <button type="button" class="variant-add-btn" onclick="addVariantField()">+ Додати варіант</button>
            </div>

            <textarea id="description" placeholder="Опис"></textarea>

            <button type="button" class="add-btn" id="saveProductBtn" onclick="saveProduct()">Додати товар</button>
            <button type="button" class="cancel-btn" id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">Скасувати редагування</button>
        </div>

        <div class="card">
            <h2>Товари</h2>
            <input type="text" id="adminSearch" class="admin-search" placeholder="Пошук товару в адмінці...">
            <div class="products-list" id="productsList"></div>
        </div>
    </div>
</div>

<script>
const API_URL = "https://site--mobilix-backend--98z6fhqjkxml.code.run";

const token = sessionStorage.getItem("adminToken") || localStorage.getItem("adminToken");

let products = [];
let editingProductId = null;
let editingProductImage = null;
let editingProductImages = [];

if (!token) {
    window.location.replace("admin-login.html");
}

function escapeHtml(value) {
    return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function getNumber(value) {
    const cleanValue = String(value || "")
        .replaceAll(" ", "")
        .replaceAll("₴", "")
        .replaceAll("грн", "")
        .replaceAll(",", ".")
        .replace(/[^\d.]/g, "");

    const number = Number(cleanValue);

    return Number.isNaN(number) ? 0 : number;
}

function getProductImages(product) {
    const images = product.images && product.images.length
        ? product.images
        : [product.image];

    return images.filter(Boolean).slice(0, 5);
}

function updateImagesPreview(images = []) {
    const preview = document.getElementById("imagesPreview");

    preview.innerHTML = images.slice(0, 5).map(image => `
        <img src="${escapeHtml(image)}" alt="">
    `).join("");
}

document.getElementById("imageFile").addEventListener("change", function () {
    const files = [...this.files].slice(0, 5);

    if (this.files.length > 5) {
        alert("Максимум 5 фото товару");
    }

    updateImagesPreview(files.map(file => URL.createObjectURL(file)));
});

document.getElementById("adminSearch").addEventListener("input", renderProducts);

async function uploadImage(file) {
    const formData = new FormData();
    formData.append("image", file);

    const response = await fetch(`${API_URL}/api/upload`, {
        method: "POST",
        headers: {
            Authorization: "Bearer " + token
        },
        body: formData
    });

    const data = await response.json();

    if (!response.ok || !data.success) {
        throw new Error(data.message || "Помилка завантаження фото");
    }

    return data.imageUrl;
}

async function collectProductImages() {
    const files = [...document.getElementById("imageFile").files].slice(0, 5);

    if (!files.length) {
        return editingProductImages.slice(0, 5);
    }

    const images = [];

    for (const file of files) {
        images.push(await uploadImage(file));
    }

    return images;
}

function addVariantField(variant = null) {
    const variantsList = document.getElementById("variantsList");

    const name = variant?.name || "";
    const price = variant?.price || "";
    const stock = variant?.stock || "";
    const image = variant?.image || "";

    variantsList.insertAdjacentHTML("beforeend", `
        <div class="variant-row" data-existing-image="${escapeHtml(image)}">
            ${image ? `<img src="${escapeHtml(image)}" class="variant-preview" alt="">` : ""}

            <div class="variant-row-top">
                <input type="text" class="variant-name" placeholder="Назва: Type-C / Lightning" value="${escapeHtml(name)}">
                <button type="button" class="variant-remove-btn" onclick="removeVariantField(this)">✕</button>
            </div>

            <input type="text" inputmode="numeric" class="variant-price" placeholder="Ціна цього варіанту" value="${escapeHtml(price)}">
            <input type="text" inputmode="numeric" class="variant-stock" placeholder="Кількість цього варіанту" value="${escapeHtml(stock)}">
            <input type="file" class="variant-image" >
        </div>
    `);
}

function removeVariantField(button) {
    button.closest(".variant-row").remove();
}

async function collectVariants() {
    const variants = [];
    const rows = document.querySelectorAll(".variant-row");

    for (const row of rows) {
        const name = row.querySelector(".variant-name").value.trim();
        const price = getNumber(row.querySelector(".variant-price").value);
        const stock = getNumber(row.querySelector(".variant-stock").value);
        const imageFile = row.querySelector(".variant-image").files[0];

        if (!name) continue;

        let image = row.dataset.existingImage || "";

        if (imageFile) {
            image = await uploadImage(imageFile);
        }

        variants.push({
            name,
            price,
            stock,
            image
        });
    }

    return variants;
}

async function loadProducts() {
    const productsList = document.getElementById("productsList");
    productsList.innerHTML = `<div class="admin-message">Завантаження товарів...</div>`;

    try {
        const response = await fetch(`${API_URL}/api/admin/products`, {
            headers: {
                Authorization: "Bearer " + token
            }
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
            productsList.innerHTML = `<div class="admin-message error">${escapeHtml(data.message || "Помилка завантаження товарів")}</div>`;
            return;
        }

        products = Array.isArray(data.products) ? data.products : [];
        renderProducts();

    } catch (error) {
        productsList.innerHTML = `<div class="admin-message error">${escapeHtml(error.message || "Помилка завантаження товарів")}</div>`;
    }
}

function renderProducts() {
    const productsList = document.getElementById("productsList");
    const search = document.getElementById("adminSearch").value.toLowerCase().trim();

    const filtered = products.filter(product => {
        const title = product.title?.toLowerCase() || "";
        const category = product.category?.toLowerCase() || "";
        return title.includes(search) || category.includes(search);
    });

    if (!filtered.length) {
        productsList.innerHTML = `<div class="admin-message">Товарів не знайдено</div>`;
        return;
    }

    productsList.innerHTML = filtered.map(renderProductCard).join("");
}

function renderProductCard(product) {
    const safeProductJson = JSON.stringify(product).replaceAll("'", "&#039;");
    const images = getProductImages(product);

    return `
        <div class="product-item">
            <img src="${escapeHtml(product.image || images[0] || "")}" alt="${escapeHtml(product.title)}">

            <div class="product-info">
                <h3>${escapeHtml(product.title)}</h3>
                <p>${escapeHtml(product.category)}</p>

                <div class="badges">
                    <span class="price-badge">${getNumber(product.price)} ₴</span>
                    ${product.oldPrice ? `<span class="old-price-badge">${getNumber(product.oldPrice)} ₴</span>` : ""}
                    <span class="stock-badge">${getNumber(product.stock)} шт.</span>
                    <span class="photo-badge">Фото: ${images.length}/5</span>
                    ${product.isHit ? `<span class="hit-badge">Хіт</span>` : ""}
                    ${product.isNew ? `<span class="new-badge">Новинка</span>` : ""}
                </div>

                ${
                    product.variants && product.variants.length
                    ? `
                        <div class="variant-tags">
                            ${product.variants.map(variant => `
                                <span>${escapeHtml(variant.name)} — ${getNumber(variant.price || product.price)} ₴ — ${getNumber(variant.stock)} шт.</span>
                            `).join("")}
                        </div>
                    `
                    : ""
                }
            </div>

            <div class="product-actions">
                <button class="edit-btn" onclick='editProduct(${safeProductJson})' type="button">Редагувати</button>
                <button class="delete-btn" onclick="deleteProduct('${product._id}')" type="button">Видалити</button>
            </div>
        </div>
    `;
}

async function saveProduct() {
    const title = document.getElementById("title").value.trim();
    const category = document.getElementById("category").value;
    const price = getNumber(document.getElementById("price").value);
    const oldPrice = getNumber(document.getElementById("oldPrice").value);
    const stock = getNumber(document.getElementById("stock").value);
    const description = document.getElementById("description").value.trim();
    const isHit = document.getElementById("isHit").checked;
    const isNew = document.getElementById("isNew").checked;

    if (!title) {
        alert("Вкажи назву товару");
        return;
    }

    if (price <= 0) {
        alert("Вкажи нормальну актуальну ціну");
        return;
    }

    if (oldPrice && oldPrice <= price) {
        alert("Стара ціна має бути більшою за актуальну");
        return;
    }

    if (stock < 0) {
        alert("Вкажи коректну кількість товару");
        return;
    }

    try {
        const images = await collectProductImages();

        if (!images.length && !editingProductId) {
            alert("Оберіть хоча б одне фото товару");
            return;
        }

        const image = images[0] || editingProductImage || "";
        const variants = await collectVariants();

        const productData = {
            title,
            category,
            price,
            oldPrice,
            stock,
            image,
            images,
            description,
            isHit,
            isNew,
            variants
        };

        const response = await fetch(
            editingProductId ? `${API_URL}/api/products/${editingProductId}` : `${API_URL}/api/products`,
            {
                method: editingProductId ? "PUT" : "POST",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + token
                },
                body: JSON.stringify(productData)
            }
        );

        const data = await response.json();

        if (!response.ok || !data.success) {
            alert(data.message || "Помилка збереження товару");
            return;
        }

        alert(editingProductId ? "Товар оновлено" : "Товар додано");
        cancelEdit();
        loadProducts();

    } catch (error) {
        alert(error.message || "Помилка збереження товару");
    }
}

function editProduct(product) {
    editingProductId = product._id;
    editingProductImage = product.image || "";
    editingProductImages = getProductImages(product);

    document.getElementById("formTitle").textContent = "Редагувати товар";
    document.getElementById("title").value = product.title || "";
    document.getElementById("category").value = product.category || "Чохли";
    document.getElementById("price").value = product.price || "";
    document.getElementById("oldPrice").value = product.oldPrice || "";
    document.getElementById("stock").value = product.stock || "";
    document.getElementById("description").value = product.description || "";
    document.getElementById("isHit").checked = Boolean(product.isHit);
    document.getElementById("isNew").checked = Boolean(product.isNew);
    document.getElementById("imageFile").value = "";

    updateImagesPreview(editingProductImages);

    document.getElementById("variantsList").innerHTML = "";

    if (product.variants && product.variants.length) {
        product.variants.forEach(addVariantField);
    }

    document.getElementById("saveProductBtn").textContent = "Зберегти зміни";
    document.getElementById("cancelEditBtn").style.display = "block";

    window.scrollTo({ top: 0, behavior: "smooth" });
}

function cancelEdit() {
    editingProductId = null;
    editingProductImage = null;
    editingProductImages = [];

    document.getElementById("formTitle").textContent = "Додати товар";
    document.getElementById("title").value = "";
    document.getElementById("category").value = "Чохли";
    document.getElementById("price").value = "";
    document.getElementById("oldPrice").value = "";
    document.getElementById("stock").value = "";
    document.getElementById("description").value = "";
    document.getElementById("isHit").checked = false;
    document.getElementById("isNew").checked = false;
    document.getElementById("imageFile").value = "";
    document.getElementById("variantsList").innerHTML = "";

    updateImagesPreview([]);

    document.getElementById("saveProductBtn").textContent = "Додати товар";
    document.getElementById("cancelEditBtn").style.display = "none";
}

async function deleteProduct(id) {
    if (!confirm("Видалити товар?")) return;

    try {
        const response = await fetch(`${API_URL}/api/products/${id}`, {
            method: "DELETE",
            headers: {
                Authorization: "Bearer " + token
            }
        });

        const data = await response.json();

        if (response.ok && data.success) {
            loadProducts();
        } else {
            alert(data.message || "Помилка видалення товару");
        }
    } catch (error) {
        alert(error.message || "Помилка видалення товару");
    }
}

function logout() {
    sessionStorage.removeItem("adminToken");
    localStorage.removeItem("adminToken");
    window.location.href = "admin-login.html";
}

loadProducts();
</script>
</body>
</html>
