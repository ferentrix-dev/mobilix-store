<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobilix Admin</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#f3f4f6;
    padding:30px;
}

.admin-container{
    max-width:1200px;
    margin:auto;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.topbar h1{
    font-size:32px;
}

.logout-btn{
    height:45px;
    padding:0 20px;
    border:none;
    border-radius:10px;
    background:#ef4444;
    color:white;
    cursor:pointer;
    font-weight:600;
}

.grid{
    display:grid;
    grid-template-columns:350px 1fr;
    gap:25px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
}

.card h2{
    margin-bottom:20px;
}

input,
textarea{
    width:100%;
    margin-bottom:15px;
    border:1px solid #d1d5db;
    border-radius:10px;
    padding:14px;
    font-size:15px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    border:none;
    cursor:pointer;
}

.add-btn{
    width:100%;
    height:50px;
    background:#2563eb;
    color:white;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
}

.products-list{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.product-item{
    display:flex;
    gap:15px;
    align-items:center;
    background:#f9fafb;
    padding:15px;
    border-radius:15px;
}

.product-item img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:12px;
}

.product-info{
    flex:1;
}

.product-info h3{
    margin-bottom:8px;
}

.product-info p{
    color:#6b7280;
    margin-bottom:5px;
}

.delete-btn{
    width:45px;
    height:45px;
    border-radius:10px;
    background:#ef4444;
    color:white;
    font-size:18px;
}

@media(max-width:900px){

.grid{
    grid-template-columns:1fr;
}

}

</style>

</head>
<body>

<div class="admin-container">

<div class="topbar">

<h1>Mobilix Admin</h1>

<button class="logout-btn" onclick="logout()">
Вийти
</button>

</div>

<div class="grid">

<div class="card">

<h2>Додати товар</h2>

<input type="text" id="title" placeholder="Назва товару">

<input type="text" id="category" placeholder="Категорія">

<input type="number" id="price" placeholder="Ціна">

<input type="text" id="image" placeholder="Фото URL або шлях">

<textarea id="description" placeholder="Опис"></textarea>

<button class="add-btn" onclick="addProduct()">
Додати товар
</button>

</div>

<div class="card">

<h2>Товари</h2>

<div class="products-list" id="productsList">

</div>

</div>

</div>

</div>

<script>

const API_URL = "https://mobilix-backend-production.up.railway.app";

const token = localStorage.getItem("adminToken");

if(!token){
    window.location.href = "admin-login.html";
}

async function loadProducts(){

    const response = await fetch(
        `${API_URL}/api/products`
    );

    const products = await response.json();

    const productsList = document.getElementById("productsList");

    productsList.innerHTML = "";

    products.forEach(product => {

        productsList.innerHTML += `
        
        <div class="product-item">

            <img src="${product.image}">

            <div class="product-info">

                <h3>${product.title}</h3>

                <p>${product.category}</p>

                <p>${product.price} ₴</p>

            </div>

            <button 
                class="delete-btn"
                onclick="deleteProduct('${product._id}')"
            >
                ✕
            </button>

        </div>
        
        `;

    });

}

async function addProduct(){

    const title = document.getElementById("title").value;
    const category = document.getElementById("category").value;
    const price = document.getElementById("price").value;
    const image = document.getElementById("image").value;
    const description = document.getElementById("description").value;

    const response = await fetch(
        `${API_URL}/api/products`,
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                title,
                category,
                price,
                image,
                description,
                variants:[]
            })
        }
    );

    if(response.ok){

        loadProducts();

        document.getElementById("title").value = "";
        document.getElementById("category").value = "";
        document.getElementById("price").value = "";
        document.getElementById("image").value = "";
        document.getElementById("description").value = "";

    }

}

async function deleteProduct(id){

    await fetch(
        `${API_URL}/api/products/${id}`,
        {
            method:"DELETE"
        }
    );

    loadProducts();

}

function logout(){

    localStorage.removeItem("adminToken");

    window.location.href = "admin-login.html";

}

loadProducts();

</script>

</body>
</html>
