<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login — Mobilix</title>
        <link rel="icon" type="image/png" href="Images/favicon.png">


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#eef4ff,#ffffff);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.login-card{
    width:100%;
    max-width:420px;
    background:white;
    padding:34px;
    border-radius:24px;
    box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.logo{
    font-size:36px;
    font-weight:800;
    margin-bottom:8px;
}

.logo span{
    color:#2563eb;
}

.login-card p{
    color:#667085;
    margin-bottom:28px;
}

.input-box{
    position:relative;
    margin-bottom:16px;
}

.input-box i{
    position:absolute;
    left:16px;
    top:50%;
    transform:translateY(-50%);
    color:#667085;
}

.input-box input{
    width:100%;
    height:54px;
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:0 16px 0 46px;
    font-size:15px;
    outline:none;
}

.input-box input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.08);
}

button{
    width:100%;
    height:54px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-top:6px;
}

button:hover{
    background:#1d4ed8;
}

.back-link{
    display:block;
    margin-top:20px;
    text-align:center;
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

.error{
    display:none;
    margin-top:14px;
    padding:12px;
    border-radius:12px;
    background:#fee2e2;
    color:#991b1b;
    font-size:14px;
    font-weight:600;
}

@media(max-width:480px){
    .login-card{
        padding:26px;
        border-radius:20px;
    }

    .logo{
        font-size:32px;
    }
}
</style>
</head>

<body>

<div class="login-card">

    <div class="logo">Mobi<span>lix</span></div>

    <p>Вхід в адмін-панель магазину</p>

    <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Введіть пароль">
    </div>

    <button onclick="login()">Увійти</button>

    <div class="error" id="errorBox">
        Невірний пароль
    </div>

    <a href="index.html" class="back-link">← На головну</a>

</div>

<script>
const API_URL = "https://site--mobilix-backend--98z6fhqjkxml.code.run";

async function login(){
    const password = document.getElementById("password").value.trim();
    const errorBox = document.getElementById("errorBox");

    const response = await fetch(`${API_URL}/api/admin/login`, {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({ password })
    });

    const data = await response.json();

    if(data.success){
        sessionStorage.setItem("adminToken", data.token);
        window.location.href = "admin.html";
    }else{
        errorBox.style.display = "block";
    }
}
</script>

</body>
</html>
