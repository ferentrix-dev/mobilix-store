<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товарів | Mobilix</title>
    <meta name="description" content="Каталог аксесуарів для смартфонів Mobilix. Чохли, кабелі, зарядні пристрої, навушники та інші товари з доставкою по Україні.">
    <link rel="icon" href="Images/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<section class="catalog-page">
    <a href="index.html" class="back-link">← На головну</a>

    <div class="page-hero">
        <span>Mobilix</span>
        <h1>Каталог товарів</h1>
        <p>Оберіть потрібний товар. Фото можна гортати прямо в каталозі.</p>
    </div>

    <div class="catalog-controls">
        <input type="text" id="searchInput" placeholder="Пошук товару...">

        <select id="categoryFilter">
            <option value="all">Усі категорії</option>
            <option value="Чохли">Чохли</option>
            <option value="Зарядні пристрої">Зарядні пристрої</option>
            <option value="Кабелі">Кабелі</option>
            <option value="Навушники">Навушники</option>
            <option value="Повербанки">Повербанки</option>
            <option value="Тримачі">Тримачі</option>
            <option value="Захисне скло">Захисне скло</option>
            <option value="Смарт-годинники">Смарт-годинники</option>
            <option value="Портативні колонки">Портативні колонки</option>
            <option value="Аксесуари">Аксесуари</option>
            <option value="Карти пам'яті">Карти пам'яті</option>
        </select>

        <select id="sortFilter">
            <option value="default">За замовчуванням</option>
            <option value="cheap">Спочатку дешевші</option>
            <option value="expensive">Спочатку дорожчі</option>
            <option value="new">Новинки</option>
            <option value="hit">Хіти продажу</option>
            <option value="discount">Зі знижкою</option>
        </select>
    </div>

    <div class="products-grid" id="productsGrid"></div>
</section>

<footer class="site-footer">
    <div class="footer-logo">Mobi<span>lix</span></div>

    <div class="footer-links">
        <a href="about.html">Про нас</a>
        <a href="delivery.html">Доставка і оплата</a>
        <a href="warranty.html">Гарантія</a>
        <a href="contacts.html">Контакти</a>
        <a href="sales.html">Акції</a>
        <a href="faq.html">Питання та відповіді</a>
    </div>

    <p>© 2026 Mobilix. Мобільні аксесуари з доставкою по Україні.</p>
</footer>

<script src="toast.js"></script>
<script src="catalog.js"></script>
</body>
</html>
